<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship!</title>
    <script src="./main.js" type="module" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <dialog id="endGameDialog" closedby="none">
        <div id="playerTitles">
            <p>Player 1</p>
            <P>Player 2</P>
        </div>
        <div id="playerStatsContainer">
            <div id="player1Stats">
                <div class="shotStats">
                    <p class="shotsP">Number of shots: <span></span></p>
                    <p class="hitsMissesP">Number of hits | misses: <span class="hits"></span> | <span class="misses"></span></p>
                    <p class="hitPercentP">Hit percent: <span></span>%</p>
                    <p class="shotsToWinP">Number of shots needed to win: <span></span></p>
                </div>
                <div class="board"></div>
            </div>
            <div id="player2Stats">
                <div class="shotStats">
                    <p class="shotsP">Number of shots: <span></span></p>
                    <p class="hitsMissesP">Number of hits | misses: <span class="hits"></span> | <span class="misses"></span></p>
                    <p class="hitPercentP">Hit percent: <span></span>%</p>
                    <p class="shotsToWinP">Number of shots needed to win: <span></span></p>
                </div>
                <div class="board"></div>
            </div>
        </div>
        <button id="playAgainButton">Play Again</button>
    </dialog>

    <div class = "header">
        <div>
            <button id="howToPlayButton">How to Play</button>
        </div>
        <div>
            <p>Length 5 Ship</p>
            <button id="select5LengthShipButton">Amount to place: <span id="select5LengthShipSpan">1</span></button>
        </div>
        <div>
            <p>Length 4 Ship</p>
            <button id="select4LengthShipButton">Amount to place: <span id="select4LengthShipSpan">1</span></button>
        </div>
        <div>
            <p>Length 3 Ship</p>
            <button id="select3LengthShipButton">Amount to place: <span id="select3LengthShipSpan">2</span></button>
        </div>
        <div>
            <p>Length 2 Ship</p>
            <button id="select2LengthShipButton">Amount to place: <span id="select2LengthShipSpan">1</span></button>
        </div>
    </div>
    <div class = "boardArea">
        <div class = "board" id = "board1">
            <!-- divs with class="cell friend" will go here, they are created via JS to save space here -->
            <!-- <div class="cell hit"></div>
            <div class="cell friend"></div>
            <div class="cell miss"></div>
            <div class="cell ship"></div> -->
        </div>
        <div class = "board" id = "board2">
            <!-- divs with class="cell foe" will go here, they are created via JS to save space here -->
            <!-- <div class="cell hit"></div>
            <div class="cell foe"></div>
            <div class="cell miss"></div>
            <div class="cell foe"></div> foe board won't show ships -->
        </div>
    </div>
    <div class = "footer">
        <button id="hideBoardsButton">Hide Boards</button> <!-- Hides the boards so players can swap -->
        <button id="swapPlayersButton">Swap Players</button> <!-- Used for players to logically understand they need to swap who has the screen -->
        <button id="revealBoardsButton">Reveal Boards</button> <!-- Reveals the boards so the active player can take an action -->
    </div>
</body>
</html>
